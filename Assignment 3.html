
<!DOCTYPE html>
<html>
<head>
    <title>Shaadi.com Profile Form</title>
</head>
<body>

    <h1>Shaadi.com Profile Registration</h1>
    <hr>

    <form>

        <h2>Personal Details</h2>

        <label>Full Name:</label><br>
        <input type="text" name="fullname" placeholder="Enter your name"><br><br>

        <label>Email Address:</label><br>
        <input type="email" name="email" placeholder="Enter your email"><br><br>

        <label>Date of Birth:</label><br>
        <input type="date" name="dob"><br><br>

        <h2>Gender</h2>

        <input type="radio" name="gender" value="Male">
        <label>Male</label><br>

        <input type="radio" name="gender" value="Female">
        <label>Female</label><br>

        <input type="radio" name="gender" value="Other">
        <label>Other</label><br><br>

        <h2>Education</h2>

        <input type="checkbox" name="education" value="BTech">
        <label>B.Tech</label><br>

        <input type="checkbox" name="education" value="MTech">
        <label>M.Tech</label><br>

        <input type="checkbox" name="education" value="MBA">
        <label>MBA</label><br>

        <input type="checkbox" name="education" value="Other">
        <label>Other</label><br><br>

        <h2>About Yourself</h2>

        <textarea rows="5" cols="40" placeholder="Write something about yourself"></textarea><br><br>

        <h2>Upload Profile Picture</h2>

        <input type="file" name="profilephoto"><br><br>

        <h2>Partner Preferences</h2>

        <label>Preferred Age:</label><br>
        <input type="number" name="age"><br><br>

        <label>City:</label><br>
        <input type="text" name="city"><br><br>

        <input type="submit" value="Create Profile">
        <input type="reset" value="Reset Form">

    </form>

</body>
</html>
