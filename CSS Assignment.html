<!DOCTYPE html>
<html>
<head>
    <title>Netflix Button</title>

    <style>
        body {
            background-color: black;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h1 {
            color: red;
            font-size: 60px;
            font-family: Arial, sans-serif;
            margin-bottom: 20px;
            letter-spacing: 3px;
        }

        button {
            background-color: red;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 15px 25px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkred;
        }
    </style>

</head>
<body>

    <h1>NETFLIX</h1>
    <button>Get Started</button>

</body>
</html>
